<hr>
<nav class="main-nav container"><ul><li><a href="index.html">Главная</a></li><li><a href="catalog.html">Каталог</a></li><li><a href="contacts.html">Контакты</a></li><li><a href="guest.html">Личный кабинет</a></li></ul></nav>
<main class="container">
  <section class="panel two-col">
    <form>
      <h2>Авторизация</h2>
      <label>Логин <input type="text" required></label>
      <label>Пароль <input type="password" required></label>
      <button type="submit">Войти</button>
    </form>
    <form>
      <h2>Регистрация</h2>
      <label>Имя <input type="text" required></label>
      <label>Email <input type="email" required></label>
      <label>Пароль <input type="password" required></label>
      <label>Повторите пароль <input type="password" required></label>
      <button type="submit">Зарегистрироваться</button>
    </form>
  </section>
</main>
<footer class="site-footer">© Все права защищены</footer>
